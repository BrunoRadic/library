{% extends 'base.html' %}

{% block content %}
<div class="form-wrapper">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="form-link">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
